version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
# FlowerAI — Docker Compose Production Stack
# Services: API, Frontend, PostgreSQL, MongoDB, Redis, ChromaDB,
#           MLflow, Grafana, Prometheus, Nginx
# ═══════════════════════════════════════════════════════════════════════════════

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 40s

networks:
  flowerai-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  chroma-data:
  mlflow-data:
  grafana-data:
  prometheus-data:
  model-cache:
  upload-storage:

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Nginx — Reverse Proxy & Load Balancer
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: flowerai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - flowerai-net
    restart: unless-stopped
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────────────────────
  # FastAPI — AI Backend
  # ─────────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
      target: production
    container_name: flowerai-api
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - POSTGRES_URL=postgresql+asyncpg://flower:${POSTGRES_PASSWORD}@postgres:5432/flowerai
      - MONGODB_URL=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8001
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - DEVICE=${DEVICE:-cpu}
      - MODEL_PRECISION=${MODEL_PRECISION:-fp32}
      - ENVIRONMENT=production
      - STORAGE_BACKEND=local
      - LOCAL_STORAGE_PATH=/app/uploads
    volumes:
      - model-cache:/app/data/models
      - upload-storage:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - flowerai-net
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: 4G
        limits:
          memory: 12G
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────────────────────
  # Next.js — Frontend
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../infrastructure/docker/Dockerfile.frontend
    container_name: flowerai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - flowerai-net
    restart: unless-stopped
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — Primary Relational Database
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: flowerai-postgres
    environment:
      POSTGRES_DB: flowerai
      POSTGRES_USER: flower
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowerai_secret_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - flowerai-net
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "pg_isready -U flower -d flowerai"]
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────────────────────
  # MongoDB — Document Store (predictions, logs, garden data)
  # ─────────────────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: flowerai-mongo
    environment:
      MONGO_INITDB_DATABASE: flowerai
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - flowerai-net
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────────────────────
  # Redis — Cache, Sessions, Rate Limiting
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: flowerai-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - flowerai-net
    restart: unless-stopped
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────────────────────
  # ChromaDB — Vector Database for RAG
  # ─────────────────────────────────────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:0.5.0
    container_name: flowerai-chroma
    volumes:
      - chroma-data:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - CHROMA_SERVER_AUTHN_PROVIDER=none
    networks:
      - flowerai-net
    restart: unless-stopped
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────────────────────
  # MLflow — Experiment Tracking & Model Registry
  # ─────────────────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: flowerai-mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://flower:${POSTGRES_PASSWORD:-flowerai_secret_2024}@postgres:5432/mlflow
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow-data:/mlflow/artifacts
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flowerai-net
    restart: unless-stopped
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────────────────────
  # Prometheus — Metrics Collection
  # ─────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: flowerai-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - flowerai-net
    restart: unless-stopped
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────────────────────
  # Grafana — Dashboards & Alerting
  # ─────────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: flowerai-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-flowerai_grafana}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - flowerai-net
    restart: unless-stopped
    logging: *default-logging

  # ─────────────────────────────────────────────────────────────────────────────
  # Celery Worker — Background Tasks (training jobs, video processing)
  # ─────────────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
      target: production
    container_name: flowerai-worker
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - POSTGRES_URL=postgresql+asyncpg://flower:${POSTGRES_PASSWORD}@postgres:5432/flowerai
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - model-cache:/app/data/models
      - upload-storage:/app/uploads
    depends_on:
      - redis
      - postgres
    networks:
      - flowerai-net
    restart: unless-stopped
    logging: *default-logging
